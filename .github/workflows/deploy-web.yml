name: Deploy Web

# Deploys Flutter web to Firebase Hosting manually (workflow_dispatch).
#
# Required GitHub secrets:
#   FIREBASE_SERVICE_ACCOUNT    — JSON key for a GCP service account with the
#                                 "Firebase Hosting Admin" role.
#   FIREBASE_OPTIONS_DART_B64   — base64-encoded lib/firebase_options.dart
#                                 Generate: base64 -i lib/firebase_options.dart | pbcopy

on:
  workflow_dispatch:

jobs:
  deploy-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART_B64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --dart-define=FLUTTER_WEB_USE_SKIA=true

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FORMTRACT }}
          channelId: live
          projectId: formtract
